<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <fieldset>
        <legend align="center">Personal detail</legend>

    <form action="thankyou.html" method="post">
        <table>
            <tr>
                <td>Name</td>
                <td><input type="text" name="name" id="" placeholder="Enter your name" required></td>
            </tr>
            <tr>
                <td>FName</td>
                <td><input type="text" name="sname" id="" size="30"></td>
            </tr>
            <tr>
                <td>Age</td>
                <td><input type="number" name="" id=""></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" name="" id=""></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="" id=""></td>
            </tr>
            <tr>
                <td>Mobile</td>
                <td><input type="tel" name="" id=""></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea rows="4" cols="30" name="add" id=""></textarea></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    Male <input type="radio" name="gender" value="male" id="">
                    Female <input type="radio" name="gender" value="female" id="">
                    Other <input type="radio" name="gender" value="other" id="">
                </td>
            </tr>
            <tr>
                <td>Hoobies</td>
                <td>
                    cricket <input type="checkbox" name="hoobies" value="cricket" id="">
                    football <input type="checkbox" name="hoobies" value="football" id="">
                    basketball <input type="checkbox" name="hoobies" value="basketball" id="">
                </td>
            </tr>
            <tr>
                <td>DOB</td>
                <td><input type="date" name="" id=""></td>
                <!-- <td><input type="time" name="" id=""></td>
                <td><input type="datetime-local" name="" id=""></td>
                <td><input type="month" name="" id=""></td>
                <td><input type="week" name="" id=""></td> -->
            </tr>
            <tr>
                <td>State</td>
                <td>
                    <select name="" id="">
                        <optgroup label="india">
                            <option value="" selected disabled>Select State</option>
                        <option value="gujarat">Gujarat</option>
                        <option value="rajasthan">Rajasthan</option>
                        <option value="maharashtra" disabled>Maharashtra</option>
                        <option value="tamilnadu">Tamilnadu</option>
                        </optgroup>
                        <optgroup label="pakistan" disabled>
                            <option value="islamabad">Islamabad</option>
                            <option value="gilgit">Gilgit</option>
                            <option value="faridkot">Faridkot</option>
                            <option value="karachi">Karachi</option>
                            <option value="baluchistan">Baluchistan</option>
                        </optgroup>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Attach file</td>
                <td><input type="file" name="" id=""></td>
            </tr>
            <tr>
                <td>color</td>
                <td><input type="color" name="" id=""></td>
            </tr>
            <tr>
                <td><input type="submit" value="submit" name="" id=""></td>
                <td><input type="reset" name="" id=""></td>
            </tr>
        </table>
    </form>

    </fieldset>



</body>
</html>
